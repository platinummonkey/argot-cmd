name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push coverage.svg back to main

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run coverage (all features)
        run: |
          cargo tarpaulin \
            --all-features \
            --out Json \
            --output-dir coverage/ \
            --timeout 120 \
            --exclude-files "argot-derive/*" \
            --exclude-files "examples/*"

      - name: Generate coverage badge SVG
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("coverage/tarpaulin-report.json") as f:
              data = json.load(f)

          pct = float(data.get("coverage", 0))
          pct_str = f"{pct:.1f}%"

          if pct >= 80:
              colour = "#4c1"
          elif pct >= 60:
              colour = "#a3c51c"
          elif pct >= 40:
              colour = "#f89406"
          else:
              colour = "#e05d44"

          label = "coverage"
          label_w = 61
          value_w = max(len(pct_str) * 7 + 10, 36)
          total_w = label_w + value_w

          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{total_w}" height="20">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="{total_w}" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="{label_w}" height="20" fill="#555"/>
              <rect x="{label_w}" width="{value_w}" height="20" fill="{colour}"/>
              <rect width="{total_w}" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="{label_w // 2}" y="14" fill="#010101" fill-opacity=".3">{label}</text>
              <text x="{label_w // 2}" y="13">{label}</text>
              <text x="{label_w + value_w // 2}" y="14" fill="#010101" fill-opacity=".3">{pct_str}</text>
              <text x="{label_w + value_w // 2}" y="13">{pct_str}</text>
            </g>
          </svg>"""

          with open("coverage.svg", "w") as f:
              f.write(svg)

          print(f"Coverage: {pct_str}")
          if pct < 75:
              print(f"ERROR: coverage {pct_str} is below the 75% threshold", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          if git diff --cached --quiet; then
            echo "No badge changes to commit"
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi
