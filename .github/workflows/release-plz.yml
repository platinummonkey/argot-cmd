name: Release

# Tag routing:
#   v*-derive     — publish argot-cmd-derive only
#   v*-cmd        — publish argot-cmd only + create GitHub release

on:
  push:
    tags:
      - "v*-derive"
      - "v*-cmd"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish argot-cmd-derive
        if: ${{ endsWith(github.ref_name, '-derive') }}
        run: cargo publish -p argot-cmd-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish argot-cmd
        if: ${{ endsWith(github.ref_name, '-cmd') }}
        run: cargo publish -p argot-cmd
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [publish]
    if: ${{ endsWith(github.ref_name, '-cmd') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Create GitHub Release with source tarballs
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
